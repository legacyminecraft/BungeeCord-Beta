name: Release Workflow

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          server-id: 'johnymuffin-nexus'
          server-username: 'NEXUS_USERNAME'
          server-password: 'NEXUS_PASSWORD'

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5.1
        with:
          maven-version: '3.9.16'

      - name: Set Build Information
        run: |
          echo "PROJECT_VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)" >> $GITHUB_ENV
          echo "GIT_BRANCH=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "GIT_COMMIT=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
          echo "BUILD_TIMESTAMP=$(date --utc +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Build & Deploy to Nexus
        run: mvn -B -DskipTests clean deploy
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Create GitHub Release
        if: ${{ !endsWith(env.PROJECT_VERSION, '-SNAPSHOT') }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.PROJECT_VERSION }}
          name: ${{ env.PROJECT_VERSION }}
          files: |
            bootstrap/target/bungeecord-beta-bootstrap-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}